# KT AI/Data Platform Portal - Keycloak (Development Mode)
#
# ⚠️ 개발용 설정입니다. 운영환경에서는 아래 사항을 반드시 변경하세요.
#  - 관리자 비밀번호(admin/admin) 사용 금지
#  - 외부 PostgreSQL 등 영속성 데이터베이스 사용
#  - HTTPS 적용
#  - KEYCLOAK_ADMIN 및 KEYCLOAK_ADMIN_PASSWORD를 안전한 방식(예: secret)으로 관리

services:
  keycloak:
    container_name: kt-keycloak
    image: quay.io/keycloak/keycloak:26.2.4
    command: ["start-dev", "--http-port=8080"]
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      # 개발 중 설정/데이터 유지용 (운영 시 외부 DB 사용 권장)
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  keycloak-data:
