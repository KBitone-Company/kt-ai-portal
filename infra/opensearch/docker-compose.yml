services:
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: kt-opensearch
    environment:
      - cluster.name=kt-opensearch-cluster
      - node.name=kt-opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin@kt-ai-0123
      - action.auto_create_index=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - kt-opensearch-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    container_name: kt-opensearch-dashboards
    environment:
      - 'OPENSEARCH_HOSTS=["http://kt-opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - kt-opensearch-net
    depends_on:
      - opensearch

volumes:
  opensearch-data:

networks:
  kt-opensearch-net:
    driver: bridge

# 운영환경 참고사항:
# - 보안 플러그인 활성화 및 TLS 설정 필요
# - 인증/인가(admin, kibanaserver 등) 계정 관리 필요
# - 다중 노드 클러스터 구성(discovery.seed_hosts 등) 필요
# - JVM 힙 및 파일 디스크립터 리밋 조정 필요
# - 정기 스냅샷 및 모니터링 구성 필요
